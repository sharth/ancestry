@if (vm(); as vm) {
  <h1>{{ vm.name || xref() }}</h1>

  <h2>Sources</h2>
  <app-repository-sources [xref]="xref()" />

  <h2>Gedcom</h2>
  <pre>{{ vm.gedcom }}</pre>

  <div class="position-fixed bottom-0 end-0 rounded-circle m-5">
    <button
      type="button"
      class="btn btn-primary btn-lg bi-pencil"
      aria-label="Edit repository"
      (click)="openRepositoryEditor()"
    ></button>
  </div>

  <app-gedcom-editor-dialog #editDialog type="REPO" [xref]="xref()" />
}
