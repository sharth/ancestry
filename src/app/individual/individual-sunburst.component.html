<div
  style="
    width: 100%;
    height: 600px;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    background-color: #f5f5f5;
    border: 1px solid black;
  "
>
  <svg
    #svgElement
    width="100%"
    height="100%"
    viewBox="-400 -300 800 600"
    style="
      max-width: 100%;
      font-family: sans-serif;
      touch-action: none;
      display: block;
      overflow: visible;
    "
  >
    <rect
      x="-8000"
      y="-6000"
      width="16000"
      height="12000"
      fill="transparent"
      pointer-events="all"
    ></rect>
    <g #zoomGroup>
      <circle
        [attr.r]="centerRadius"
        [attr.fill]="color(individual())"
        stroke="#fff"
        stroke-width="2"
      ></circle>
      <foreignObject
        [attr.x]="-s / 2"
        [attr.y]="-s / 2"
        [attr.width]="s"
        [attr.height]="s"
      >
        <div
          style="
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            overflow: hidden;
            font-weight: bold;
            font-size: 14px;
            text-overflow: ellipsis;
          "
        >
          {{ fullname(individual()) }}
        </div>
      </foreignObject>
      @for (
        node of sunburstNodes();
        track node.individual.xref + "-" + $index
      ) {
        <a
          [routerLink]="['/individual', node.individual.xref]"
          style="text-decoration: none; cursor: pointer"
        >
          <path
            [attr.d]="node.arc"
            [attr.fill]="node.color"
            stroke="#fff"
            stroke-width="2"
          />
          <foreignObject
            [attr.width]="node.width"
            [attr.height]="node.height"
            [style.translate]="`${node.x}px ${node.y}px`"
            [style.rotate]="`${node.rotation}deg`"
            style="pointer-events: none"
            [attr.x]="-node.width / 2"
            [attr.y]="-node.height / 2"
          >
            <div
              style="
                width: 100%;
                height: 100%;
                display: flex;
                align-items: center;
                justify-content: center;
                text-align: center;
                font-size: 12px;
                padding: 0 4px;
                box-sizing: border-box;
                overflow: hidden;
                white-space: nowrap;
                text-overflow: ellipsis;
              "
            >
              {{ fullname(node.individual) }}
            </div>
          </foreignObject>
        </a>
      }
    </g>
  </svg>
</div>
