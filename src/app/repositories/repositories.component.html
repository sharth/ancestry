@if (vm(); as vm) {
  <h1>{{ vm.repositories.length }} Repositories</h1>
  <ul>
    @for (repository of vm.repositories; track repository) {
      <li>
        <a routerLink="/repository/{{ repository.xref }}">{{
          repository.name || repository.xref
        }}</a>
      </li>
    }
  </ul>

  <div class="position-fixed bottom-0 end-0 rounded-circle m-5">
    <button
      type="button"
      class="btn btn-primary btn-lg bi-plus"
      aria-label="Add repository"
      (click)="editDialog.showModal()"
    ></button>
  </div>

  <app-gedcom-editor-dialog
    #editDialog
    type="REPO"
    [ancestryDatabase]="ancestryDatabase()"
  />
}
